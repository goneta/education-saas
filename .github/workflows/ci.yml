name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///./education_saas_ci.db
      SECRET_KEY: ci-secret-key-change-in-production
      JWT_SECRET_KEY: ci-secret-key-change-in-production
      FIELD_ENCRYPTION_KEY: ""
      RATE_LIMIT_MAX_REQUESTS: "10000"
      AUTH_RATE_LIMIT_MAX_REQUESTS: "10000"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt
      - name: Run migrations
        run: python -m alembic upgrade head
      - name: Compile backend
        run: python -m compileall backend
      - name: Run backend tests
        run: python -m pytest backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Lint frontend
        working-directory: frontend
        run: npm run lint
      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    env:
      DATABASE_URL: sqlite:///./education_saas_e2e.db
      SECRET_KEY: ci-secret-key-change-in-production
      JWT_SECRET_KEY: ci-secret-key-change-in-production
      RATE_LIMIT_MAX_REQUESTS: "10000"
      AUTH_RATE_LIMIT_MAX_REQUESTS: "10000"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Migrate E2E database
        run: python -m alembic upgrade head
      - name: Run critical E2E
        working-directory: frontend
        run: npm run test:e2e
